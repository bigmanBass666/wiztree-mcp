name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to publish"
        required: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Only publish on actual releases, not manual triggers (safety guard)
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'yes')

    permissions:
      contents: read
      id-token: write  # Required for trusted PyPI publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1